kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    # Expose NodePort 30080 to localhost so the reachability gate and load
    # generator can reach the app via http://localhost:30080
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
