# k8s/presets/deployment-tiny-safe.yaml — minimal-resource deployment fallback
# Used by fix_hpa_303 attempt 3 to ensure CPU requests are always present.
# Image matches k8s/app/landing/ (nginx:alpine landing page default).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    preset: deployment-tiny-safe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
