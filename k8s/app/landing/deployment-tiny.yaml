apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  labels:
    app: autoscaling-lab
    mode: landing
    profile: tiny
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoscaling-lab
  template:
    metadata:
      labels:
        app: autoscaling-lab
        mode: landing
        profile: tiny
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
